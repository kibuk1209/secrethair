<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1f18"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c87a"/>
      <stop offset="100%" stop-color="#a87c3a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer gold border -->
  <rect x="10" y="10" width="492" height="492" rx="88" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.7"/>

  <!-- Inner subtle border -->
  <rect x="26" y="26" width="460" height="460" rx="74" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.25"/>

  <!-- === SCISSORS === -->
  <!-- Handle ring LEFT (top) -->
  <circle cx="148" cy="130" r="50" fill="none" stroke="url(#gold)" stroke-width="20"/>
  <circle cx="148" cy="130" r="24" fill="#1a1a1a"/>

  <!-- Handle ring RIGHT (top) -->
  <circle cx="364" cy="130" r="50" fill="none" stroke="url(#gold)" stroke-width="20" opacity="0.75"/>
  <circle cx="364" cy="130" r="24" fill="#1a1a1a"/>

  <!-- Blade LEFT (from handle toward pivot) -->
  <path d="M148,176 L270,278" stroke="url(#gold)" stroke-width="24" stroke-linecap="round"/>

  <!-- Blade RIGHT (from handle toward pivot) -->
  <path d="M364,176 L270,278" stroke="url(#gold)" stroke-width="24" stroke-linecap="round" opacity="0.75"/>

  <!-- Pivot dot -->
  <circle cx="270" cy="278" r="14" fill="#c9a96e"/>

  <!-- Blade LEFT extension (open) -->
  <path d="M270,278 L175,390" stroke="#c9a96e" stroke-width="18" stroke-linecap="round" opacity="0.45"/>

  <!-- Blade RIGHT extension (open) -->
  <path d="M270,278 L365,390" stroke="#c9a96e" stroke-width="18" stroke-linecap="round" opacity="0.3"/>

  <!-- Decorative line separator -->
  <line x1="80" y1="432" x2="432" y2="432" stroke="#c9a96e" stroke-width="1" opacity="0.3"/>

  <!-- Shop name text -->
  <text x="256" y="475"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40"
    font-style="italic"
    fill="#c9a96e"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.9">SecretHair</text>

  <!-- Corner decorations -->
  <circle cx="60"  cy="60"  r="3" fill="#c9a96e" opacity="0.35"/>
  <circle cx="452" cy="60"  r="3" fill="#c9a96e" opacity="0.35"/>
  <circle cx="60"  cy="452" r="3" fill="#c9a96e" opacity="0.35"/>
  <circle cx="452" cy="452" r="3" fill="#c9a96e" opacity="0.35"/>
</svg>
